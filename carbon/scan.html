<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR 스캔 - 탄소중립 실천</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000; color: white; }

    .scan-header {
      padding: 16px; text-align: center;
      background: rgba(0,0,0,0.8); position: relative; z-index: 10;
    }
    .scan-header h1 { font-size: 1.2em; }
    .scan-header p { font-size: 0.8em; opacity: 0.7; margin-top: 4px; }
    .back-btn {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: white; text-decoration: none; font-size: 1.5em;
    }

    #qr-reader { width: 100%; max-width: 500px; margin: 0 auto; }

    .result-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); z-index: 100;
      flex-direction: column; justify-content: center; align-items: center;
      padding: 20px;
    }
    .result-overlay.show { display: flex; }
    .result-card {
      background: white; color: #333; border-radius: 16px; padding: 30px;
      text-align: center; max-width: 320px; width: 100%;
    }
    .result-card .icon { font-size: 3em; margin-bottom: 12px; }
    .result-card .title { font-size: 1.3em; font-weight: bold; margin-bottom: 8px; }
    .result-card .points { font-size: 2em; color: #2d8f4e; font-weight: bold; margin: 12px 0; }
    .result-card .detail { font-size: 0.85em; color: #888; }
    .result-card button {
      margin-top: 20px; padding: 12px 30px;
      background: #2d8f4e; color: white; border: none; border-radius: 8px;
      font-size: 1em; cursor: pointer;
    }

    .demo-notice {
      text-align: center; padding: 40px 20px; color: #aaa;
    }
    .demo-notice button {
      margin-top: 20px; padding: 12px 30px;
      background: #2d8f4e; color: white; border: none; border-radius: 8px;
      font-size: 1em; cursor: pointer;
    }
  </style>
</head>
<body>

<div class="scan-header">
  <a href="/carbon/" class="back-btn">&larr;</a>
  <h1>QR 스캔</h1>
  <p>매장의 실천항목 QR을 스캔하세요</p>
</div>

<div class="demo-notice">
  <p>&#128247; 카메라 QR 스캔은 HTTPS 환경에서 동작합니다.</p>
  <p style="margin-top:8px;">현재 데모 모드에서는 아래 버튼으로 테스트할 수 있습니다.</p>
  <br>
  <button onclick="demoScan('bag', 50)">&#128722; 장바구니 인증</button><br><br>
  <button onclick="demoScan('container', 500)">&#129379; 개인용기 인증</button><br><br>
  <button onclick="demoScan('eco_product', 500)">&#127793; 친환경제품 인증</button><br><br>
  <button onclick="demoScan('refill', 500)">&#129704; 리필스테이션 인증</button>
</div>

<!-- 결과 오버레이 -->
<div class="result-overlay" id="result-overlay">
  <div class="result-card" id="result-card">
    <div class="icon" id="result-icon">&#127807;</div>
    <div class="title" id="result-title">인증 완료!</div>
    <div class="points" id="result-points">+500P</div>
    <div class="detail" id="result-detail">품앗이생협 지족점</div>
    <button onclick="closeResult()">확인</button>
  </div>
</div>

<script>
const TYPES = {
  bag: '장바구니 이용',
  container: '개인용기 포장',
  eco_product: '친환경제품 구매',
  refill: '리필스테이션 이용'
};

function demoScan(type, points) {
  document.getElementById('result-icon').textContent = '\u{1F33F}';
  document.getElementById('result-title').textContent = TYPES[type] + ' 인증 완료!';
  document.getElementById('result-points').textContent = '+' + points + 'P';
  document.getElementById('result-detail').textContent = '품앗이마을 지족점 | ' + new Date().toLocaleString('ko-KR');
  document.getElementById('result-overlay').classList.add('show');
}

function closeResult() {
  document.getElementById('result-overlay').classList.remove('show');
}
</script>
</body>
</html>
