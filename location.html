<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>위치 인증</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: var(--tg-theme-bg-color, #fff);
  color: var(--tg-theme-text-color, #333);
}
.container { text-align: center; padding: 20px; }
.spinner { font-size: 48px; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.msg { margin-top: 16px; font-size: 16px; }
.err { color: #e74c3c; margin-top: 16px; font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <div class="spinner" id="icon">📍</div>
  <p class="msg" id="msg">위치 확인 중...</p>
  <p class="err" id="err"></p>
</div>
<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

function sendLocation(lat, lng, acc) {
  const data = JSON.stringify({ lat: lat, lng: lng, acc: Math.round(acc) });
  tg.sendData(data);
}

function onError(error) {
  const icon = document.getElementById('icon');
  const msg = document.getElementById('msg');
  const err = document.getElementById('err');
  icon.textContent = '❌';
  icon.style.animation = 'none';

  switch(error.code) {
    case error.PERMISSION_DENIED:
      msg.textContent = '위치 권한이 필요합니다';
      err.textContent = '브라우저 설정에서 위치 권한을 허용해주세요';
      break;
    case error.POSITION_UNAVAILABLE:
      msg.textContent = '위치를 가져올 수 없습니다';
      err.textContent = 'GPS를 켜고 다시 시도해주세요';
      break;
    case error.TIMEOUT:
      msg.textContent = '위치 확인 시간 초과';
      err.textContent = '다시 시도해주세요';
      break;
    default:
      msg.textContent = '알 수 없는 오류';
      break;
  }
}

if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      sendLocation(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy);
    },
    onError,
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
} else {
  document.getElementById('icon').textContent = '❌';
  document.getElementById('msg').textContent = '이 기기에서 위치를 지원하지 않습니다';
}
</script>
</body>
</html>
