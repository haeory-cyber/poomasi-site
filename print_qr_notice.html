<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>조합원말씀 QR 안내물 — 인쇄용</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #fff;
    color: #1a1a1a;
  }

  @media screen {
    body { padding: 2rem; background: #e8e8e8; }
    .page { background: #fff; max-width: 210mm; margin: 0 auto; box-shadow: 0 2px 20px rgba(0,0,0,0.15); }
    .no-print { display: flex; justify-content: center; gap: 1rem; padding: 1.5rem; }
    .no-print button {
      padding: 0.7rem 2rem;
      font-size: 1rem;
      font-family: 'Noto Sans KR', sans-serif;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-print { background: #c4803a; color: #fff; }
    .btn-print:hover { background: #e8a55a; }
    .btn-back { background: #eee; color: #333; }
    .btn-back:hover { background: #ddd; }
  }

  @media print {
    body { padding: 0; background: #fff; }
    .no-print { display: none !important; }
    .page { box-shadow: none; }
    @page { size: A4; margin: 15mm; }
  }

  .page {
    padding: 15mm 20mm;
    height: 267mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
  }

  .brand {
    font-family: 'Noto Serif KR', serif;
    font-size: 0.9rem;
    letter-spacing: 0.4em;
    color: #8a7a5a;
    margin-bottom: 1rem;
  }

  h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 2.4rem;
    font-weight: 900;
    color: #1a1a1a;
    margin-bottom: 0.5rem;
    line-height: 1.3;
  }

  .subtitle {
    font-size: 1.15rem;
    color: #666;
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }

  .qr-box {
    border: 3px solid #1a1a1a;
    padding: 1rem;
    margin-bottom: 1.2rem;
    display: inline-block;
  }

  .qr-box img {
    width: 180px;
    height: 180px;
    display: block;
  }

  .scan-text {
    font-size: 1.3rem;
    font-weight: 700;
    color: #c4803a;
    margin-bottom: 0.3rem;
  }

  .scan-sub {
    font-size: 0.9rem;
    color: #999;
    margin-bottom: 1.5rem;
  }

  .features {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .feature {
    font-size: 0.95rem;
    color: #444;
    padding: 0.5rem 1.2rem;
    border: 1px solid #ddd;
    border-radius: 4px;
  }

  .anon-notice {
    font-size: 1rem;
    color: #3d5c35;
    font-weight: 700;
    padding: 0.8rem 2rem;
    border: 2px solid #3d5c35;
    display: inline-block;
    margin-bottom: 1rem;
  }

  .footer-text {
    font-size: 0.82rem;
    color: #aaa;
    margin-top: 1rem;
  }
</style>
</head>
<body>

<div class="no-print">
  <button class="btn-print" onclick="window.print()">인쇄하기</button>
  <button class="btn-back" onclick="history.back()">돌아가기</button>
</div>

<div class="page">
  <div class="brand">품 앗 이 생 협</div>
  <h1>조합원 말씀함</h1>
  <p class="subtitle">여러분의 한마디가 매장을 바꿉니다</p>

  <div class="qr-box">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=https://poomasi.org/feedback.html" alt="QR코드">
  </div>

  <p class="scan-text">휴대폰 카메라로 QR을 찍어주세요</p>
  <p class="scan-sub">또는 poomasi.org/feedback.html 접속</p>

  <div class="features">
    <div class="feature">필요한 물건 요청</div>
    <div class="feature">건의 / 아이디어</div>
    <div class="feature">직원 서비스</div>
  </div>

  <div class="anon-notice">완전 익명 — 이름·연락처를 수집하지 않습니다</div>

  <p class="footer-text">품앗이생협 조합원 의견 수렴 시스템</p>
</div>

</body>
</html>
