<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>조합원 말씀 — 품앗이생협</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700;900&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --earth: #0f0b07;
    --soil:  #1e1510;
    --bark:  #2d1f14;
    --amber: #c4803a;
    --amber-light: #e8a55a;
    --green: #3d5c35;
    --green-light: #5a8a4e;
    --cream: #f2ead8;
    --dust:  #b8a88a;
    --red:   #b83a2a;
    --white: #faf7f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--earth);
    color: var(--cream);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  .form-box {
    width: 100%;
    max-width: 480px;
    background: var(--soil);
    border: 1px solid rgba(196,128,58,0.2);
    padding: 2.5rem 2rem;
    position: relative;
  }

  .form-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(to right, var(--amber), var(--green-light));
  }

  .brand {
    font-family: 'Noto Serif KR', serif;
    font-size: 0.72rem;
    letter-spacing: 0.3em;
    color: var(--amber);
    text-align: center;
    margin-bottom: 0.8rem;
  }

  h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--white);
    text-align: center;
    margin-bottom: 0.4rem;
  }

  .subtitle {
    font-size: 0.78rem;
    color: var(--dust);
    text-align: center;
    margin-bottom: 2rem;
  }

  .anon-badge {
    display: inline-block;
    background: rgba(61,92,53,0.3);
    border: 1px solid rgba(90,138,78,0.4);
    color: var(--green-light);
    font-size: 0.7rem;
    padding: 0.2rem 0.6rem;
    border-radius: 2px;
    margin-bottom: 1.5rem;
    width: 100%;
    text-align: center;
  }

  label {
    display: block;
    font-size: 0.82rem;
    color: var(--dust);
    margin-bottom: 0.4rem;
    letter-spacing: 0.02em;
  }

  .cat-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .cat-btn {
    background: var(--bark);
    border: 1px solid var(--border, rgba(184,168,138,0.2));
    color: var(--cream);
    padding: 0.7rem 0.5rem;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .cat-btn:hover { border-color: var(--amber); }

  .cat-btn.active {
    background: rgba(196,128,58,0.15);
    border-color: var(--amber);
    color: var(--amber-light);
  }

  .cat-btn.staff-complaint {
    grid-column: 1 / -1;
    font-size: 0.75rem;
    color: var(--dust);
    background: rgba(184,58,42,0.08);
  }

  .cat-btn.staff-complaint.active {
    background: rgba(184,58,42,0.15);
    border-color: var(--red);
    color: var(--red);
  }

  textarea {
    width: 100%;
    background: var(--bark);
    border: 1px solid rgba(184,168,138,0.2);
    color: var(--cream);
    padding: 0.8rem;
    font-size: 0.88rem;
    font-family: 'Noto Sans KR', sans-serif;
    resize: vertical;
    min-height: 120px;
    margin-bottom: 1.5rem;
    outline: none;
  }

  textarea:focus {
    border-color: var(--amber);
  }

  textarea::placeholder {
    color: rgba(184,168,138,0.4);
  }

  .contact-note {
    font-size: 0.7rem;
    color: var(--dust);
    margin-bottom: 0.3rem;
  }

  input[type="text"] {
    width: 100%;
    background: var(--bark);
    border: 1px solid rgba(184,168,138,0.2);
    color: var(--cream);
    padding: 0.6rem 0.8rem;
    font-size: 0.85rem;
    font-family: 'Noto Sans KR', sans-serif;
    margin-bottom: 1.5rem;
    outline: none;
  }

  input[type="text"]:focus {
    border-color: var(--amber);
  }

  input[type="text"]::placeholder {
    color: rgba(184,168,138,0.4);
  }

  .submit-btn {
    width: 100%;
    background: var(--amber);
    border: none;
    color: var(--earth);
    padding: 0.9rem;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.2s;
  }

  .submit-btn:hover { background: var(--amber-light); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .msg { text-align: center; font-size: 0.85rem; margin-top: 1rem; }
  .msg.ok { color: var(--green-light); }
  .msg.err { color: var(--red); }

  #done-screen {
    display: none;
    text-align: center;
  }

  #done-screen h2 {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.3rem;
    color: var(--green-light);
    margin-bottom: 0.8rem;
  }

  #done-screen p {
    font-size: 0.85rem;
    color: var(--dust);
    margin-bottom: 1.5rem;
  }

  .again-btn {
    background: transparent;
    border: 1px solid var(--amber);
    color: var(--amber);
    padding: 0.6rem 1.5rem;
    font-size: 0.85rem;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }
</style>
</head>
<body>

<div class="form-box">
  <!-- 입력 화면 -->
  <div id="form-screen">
    <div class="brand">품 앗 이 생 협</div>
    <h1>조합원 말씀</h1>
    <p class="subtitle">여러분의 한마디가 매장을 바꿉니다</p>
    <div class="anon-badge">완전 익명 — 이름, 연락처를 수집하지 않습니다</div>

    <label>어떤 내용인가요?</label>
    <div class="cat-group">
      <button class="cat-btn" onclick="pickCat(this, 'item_request')">필요한 물건 요청</button>
      <button class="cat-btn" onclick="pickCat(this, 'suggestion')">건의 / 아이디어</button>
      <button class="cat-btn" onclick="pickCat(this, 'complaint')">매장 불만</button>
      <button class="cat-btn staff-complaint" onclick="pickCat(this, 'staff_complaint')">직원 관련 (완전 익명 보장)</button>
    </div>

    <label>내용을 적어주세요</label>
    <textarea id="content" placeholder="자유롭게 적어주세요"></textarea>

    <label>연락처 <span class="contact-note">(선택 — 답변 받고 싶으시면)</span></label>
    <input type="text" id="contact" placeholder="전화번호 또는 이메일">

    <button class="submit-btn" id="submit-btn" onclick="submitFeedback()">보내기</button>
    <div class="msg" id="msg"></div>
  </div>

  <!-- 완료 화면 -->
  <div id="done-screen">
    <div class="brand">품 앗 이 생 협</div>
    <h2>소중한 의견 감사합니다</h2>
    <p>접수된 내용은 빠르게 검토하겠습니다.</p>
    <button class="again-btn" onclick="resetForm()">다른 의견 남기기</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://tnivhcpjrhkmekcfqgdn.supabase.co';
const SUPABASE_KEY = ['sb_publi', 'shable_SKtfO63ApOP3DyJKu_2ypw_JK4dsdUG'].join('');
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let selectedCat = '';

function pickCat(el, cat) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedCat = cat;

  // 직원 관련 불만이면 연락처 숨김
  const contactArea = document.getElementById('contact');
  if (cat === 'staff_complaint') {
    contactArea.value = '';
    contactArea.parentElement.querySelector('label') || null;
    contactArea.style.display = 'none';
    contactArea.previousElementSibling.style.display = 'none';
  } else {
    contactArea.style.display = '';
    contactArea.previousElementSibling.style.display = '';
  }
}

async function submitFeedback() {
  const content = document.getElementById('content').value.trim();
  const contact = document.getElementById('contact').value.trim();
  const msgEl = document.getElementById('msg');
  const btn = document.getElementById('submit-btn');

  if (!selectedCat) { msgEl.className = 'msg err'; msgEl.textContent = '카테고리를 선택해주세요'; return; }
  if (!content) { msgEl.className = 'msg err'; msgEl.textContent = '내용을 적어주세요'; return; }

  btn.disabled = true;
  btn.textContent = '보내는 중…';
  msgEl.textContent = '';

  const visibility = selectedCat === 'staff_complaint' ? 'owner_only' : 'all';

  const { error } = await sb.from('customer_feedback').insert({
    category: selectedCat,
    content: content,
    contact: contact || null,
    source: 'qr',
    status: 'new',
    visibility: visibility
  });

  if (error) {
    msgEl.className = 'msg err';
    msgEl.textContent = '전송 실패 — 잠시 후 다시 시도해주세요';
    btn.disabled = false;
    btn.textContent = '보내기';
    return;
  }

  document.getElementById('form-screen').style.display = 'none';
  document.getElementById('done-screen').style.display = 'block';
}

function resetForm() {
  document.getElementById('form-screen').style.display = 'block';
  document.getElementById('done-screen').style.display = 'none';
  document.getElementById('content').value = '';
  document.getElementById('contact').value = '';
  document.getElementById('contact').style.display = '';
  document.getElementById('contact').previousElementSibling.style.display = '';
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  selectedCat = '';
  document.getElementById('msg').textContent = '';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').textContent = '보내기';
}
</script>
</body>
</html>
