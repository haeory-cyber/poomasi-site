<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가격표 인쇄 — 품앗이소비자생활협동조합</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;400;500;700&family=Noto+Serif+KR:wght@200&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --earth: #0f0b07;
    --soil: #1e1510;
    --bark: #2d1f14;
    --amber: #c4803a;
    --amber-light: #e8a55a;
    --green: #3d5c35;
    --green-light: #5a8a4e;
    --cream: #f2ead8;
    --dust: #b8a88a;
    --white: #faf7f0;
    --gold-bar: #E8A020;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--earth);
    color: var(--cream);
    font-family: 'Noto Sans KR', sans-serif;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 1.5rem 3rem;
    display: flex; justify-content: space-between; align-items: center;
  }
  nav::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(15,11,7,0.9), transparent);
    pointer-events: none;
  }
  .nav-logo {
    font-family: 'Noto Serif KR', serif;
    font-size: 0.85rem; font-weight: 700; letter-spacing: 0.15em;
    color: var(--amber); position: relative; text-decoration: none;
  }
  .nav-links { display: flex; gap: 2.5rem; list-style: none; position: relative; }
  .nav-links a {
    color: var(--dust); text-decoration: none; font-size: 0.75rem;
    letter-spacing: 0.1em; transition: color 0.3s;
  }
  .nav-links a:hover { color: var(--cream); }

  /* ── UI CONTAINER ── */
  .ui-wrap {
    max-width: 900px; margin: 0 auto; padding: 7rem 2rem 3rem;
  }

  h1 {
    font-size: 1.6rem; font-weight: 700; color: var(--cream);
    margin-bottom: 0.3rem;
  }
  .subtitle {
    font-size: 0.8rem; color: var(--dust); letter-spacing: 0.1em;
    margin-bottom: 2rem;
  }

  /* ── MODE TABS ── */
  .mode-tabs {
    display: flex; gap: 0; margin-bottom: 2rem;
    border-bottom: 1px solid rgba(196,128,58,0.2);
  }
  .mode-tab {
    padding: 0.7rem 1.8rem; cursor: pointer;
    font-size: 0.85rem; color: var(--dust); letter-spacing: 0.05em;
    border-bottom: 2px solid transparent; transition: all 0.2s;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: inherit;
  }
  .mode-tab.active {
    color: var(--amber); border-bottom-color: var(--amber); font-weight: 500;
  }

  /* ── QUICK MODE ── */
  .search-row {
    display: flex; gap: 0.8rem; margin-bottom: 1.5rem; align-items: center;
  }
  .search-row input {
    flex: 1; padding: 0.7rem 1rem;
    background: var(--soil); border: 1px solid rgba(196,128,58,0.25);
    border-radius: 6px; color: var(--cream); font-size: 0.9rem;
    font-family: inherit; outline: none;
  }
  .search-row input::placeholder { color: var(--dust); opacity: 0.6; }
  .search-row input:focus { border-color: var(--amber); }

  .search-results {
    display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.5rem;
  }
  .search-item {
    display: flex; align-items: center; gap: 0.8rem;
    padding: 0.6rem 1rem; background: var(--soil);
    border: 1px solid rgba(196,128,58,0.15); border-radius: 6px;
    cursor: pointer; transition: border-color 0.2s;
  }
  .search-item:hover { border-color: var(--amber); }
  .search-item.selected { border-color: var(--amber); background: rgba(196,128,58,0.08); }
  .search-item .si-name { flex: 1; font-size: 0.9rem; font-weight: 500; }
  .search-item .si-farmer { font-size: 0.75rem; color: var(--dust); }
  .search-item .si-price { font-size: 0.85rem; color: var(--amber); font-weight: 700; }

  /* ── BUTTONS ── */
  .btn {
    padding: 0.7rem 2rem; border: none; border-radius: 6px;
    font-size: 0.85rem; font-weight: 500; cursor: pointer;
    font-family: inherit; letter-spacing: 0.05em; transition: all 0.2s;
  }
  .btn-print {
    background: var(--amber); color: var(--earth);
  }
  .btn-print:hover { background: var(--amber-light); }
  .btn-print:disabled { opacity: 0.4; cursor: default; }

  .print-row {
    display: flex; gap: 1rem; align-items: center;
  }

  /* ── TAG PREVIEW (screen) ── */
  .tag-preview {
    margin-top: 2rem; padding: 1.5rem;
    background: var(--soil); border: 1px solid rgba(196,128,58,0.15);
    border-radius: 8px;
  }
  .tag-preview-title {
    font-size: 0.75rem; color: var(--dust); letter-spacing: 0.1em;
    margin-bottom: 1rem;
  }
  .preview-grid {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  }

  /* ── SINGLE TAG (65×38mm) — 코워크 서식 기준 ── */
  .tag {
    width: 65mm; height: 38mm;
    border: 1px solid #ccc;
    background: #fff; color: #262626;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    font-family: 'Noto Sans KR', sans-serif;
  }
  /* 하단 골드바 */
  .tag-bar {
    height: 6mm; background: var(--gold-bar);
    width: 100%; flex-shrink: 0;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  /* 상단 헤더: 업체명 + 매장명 */
  .tag-header {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 1.5mm 3mm 0;
  }
  .tag-farmer {
    font-size: 7pt; color: #888; font-weight: 400;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 42mm;
  }
  .tag-logo {
    font-family: 'Noto Serif KR', serif;
    font-size: 8pt; color: var(--gold-bar); font-weight: 700;
    letter-spacing: 0.05em; white-space: nowrap; flex-shrink: 0;
  }
  /* 상품명: 전체 너비 사용 */
  .tag-product {
    padding: 0.5mm 3mm 0.5mm;
    font-weight: 900; text-align: left; line-height: 1.2;
    max-height: 10mm;
    word-break: keep-all;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  }
  /* 하단: QR(좌) + 가격(우) */
  .tag-bottom {
    flex: 1; display: flex; justify-content: space-between; align-items: flex-end;
    padding: 0 3mm 0.5mm;
  }
  .tag-qr { width: 12mm; height: 12mm; flex-shrink: 0; }
  .tag-qr canvas, .tag-qr img { width: 100%; height: 100%; image-rendering: pixelated; }
  .tag-price-area { text-align: right; }
  .tag-unit { font-size: 12pt; color: #888; display: block; }
  .tag-price {
    font-size: 20pt; font-weight: 900; color: #000;
    letter-spacing: -0.03em; white-space: nowrap;
  }

  /* ── PRINT SHEET ── */
  .print-sheet { display: none; }

  @media print {
    body { background: #fff !important; }
    nav, .ui-wrap { display: none !important; }
    .print-sheet {
      display: block !important;
    }
    .print-page {
      width: 210mm; height: 297mm;
      padding: 5mm;
      display: grid;
      grid-template-columns: repeat(3, 65mm);
      grid-template-rows: repeat(6, 38mm);
      gap: 1.5mm 2mm;
      justify-content: center;
      align-content: center;
      page-break-after: always;
      overflow: hidden;
    }
    .print-page:last-child { page-break-after: avoid; }
    .tag { border: 0.5pt solid #ddd; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .tag-bar { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    @page {
      size: A4;
      margin: 0;
    }
  }

  /* ── CART ── */
  .cart-section {
    margin-top: 2rem; padding: 1.2rem;
    background: var(--soil); border: 1px solid rgba(196,128,58,0.2);
    border-radius: 8px;
  }
  .cart-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.8rem;
  }
  .cart-header h3 { font-size: 0.85rem; color: var(--cream); font-weight: 500; }
  .cart-actions { display: flex; gap: 0.5rem; }
  .cart-item {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.5rem 0.6rem; margin-bottom: 0.4rem;
    background: rgba(196,128,58,0.05); border: 1px solid rgba(196,128,58,0.1);
    border-radius: 6px;
  }
  .cart-item .ci-name { flex: 1; font-size: 0.82rem; color: var(--cream); }
  .cart-item .ci-price { font-size: 0.82rem; color: var(--amber); font-weight: 600; }
  .cart-item .ci-remove {
    width: 22px; height: 22px; border: none; border-radius: 50%;
    background: rgba(196,128,58,0.15); color: var(--dust); font-size: 0.7rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .cart-item .ci-remove:hover { background: rgba(200,80,80,0.3); color: #e88; }
  .cart-empty { text-align: center; color: var(--dust); font-size: 0.8rem; padding: 1rem; }
  .btn-sm {
    padding: 0.35rem 0.8rem; border: 1px solid rgba(196,128,58,0.3);
    border-radius: 6px; background: transparent; color: var(--dust);
    font-size: 0.75rem; cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .btn-sm:hover { border-color: var(--amber); color: var(--cream); }
  .btn-add {
    padding: 0.5rem 1.2rem; background: var(--green); color: var(--cream);
    border: none; border-radius: 6px; font-size: 0.82rem; font-weight: 500;
    cursor: pointer; font-family: inherit; transition: background 0.2s;
  }
  .btn-add:hover { background: var(--green-light); }
  .btn-add:disabled { opacity: 0.4; cursor: default; }

  /* ── HIDDEN PANELS ── */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── PRODUCT INFO VIEW (QR scan landing) ── */
  .info-view {
    max-width: 480px; margin: 0 auto; padding: 7rem 2rem 3rem;
    text-align: center;
  }
  .info-card {
    background: var(--soil); border: 1px solid rgba(196,128,58,0.2);
    border-radius: 12px; padding: 2rem 1.5rem; margin-bottom: 1.5rem;
  }
  .info-logo {
    font-family: 'Noto Serif KR', serif;
    font-size: 0.8rem; color: var(--gold-bar); font-weight: 700;
    letter-spacing: 0.1em; margin-bottom: 1.5rem;
  }
  .info-product {
    font-size: 1.8rem; font-weight: 900; color: var(--cream);
    margin-bottom: 0.8rem; word-break: keep-all;
  }
  .info-farmer {
    font-size: 0.9rem; color: var(--dust); margin-bottom: 1.2rem;
  }
  .info-divider {
    height: 1px; background: rgba(196,128,58,0.15); margin: 1.2rem 0;
  }
  .info-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 0.4rem 0;
  }
  .info-label { font-size: 0.8rem; color: var(--dust); }
  .info-value { font-size: 0.95rem; color: var(--cream); font-weight: 500; }
  .info-price-big {
    font-size: 2rem; font-weight: 900; color: var(--amber);
  }
  .info-bar {
    height: 4px; background: var(--gold-bar); border-radius: 2px;
    margin-top: 1.5rem;
  }
  .info-order-btn {
    display: inline-block; margin-top: 1rem; padding: 0.8rem 2.5rem;
    background: var(--green); color: var(--cream); border: none;
    border-radius: 8px; font-size: 0.9rem; font-weight: 500;
    font-family: inherit; cursor: pointer; text-decoration: none;
    transition: background 0.2s;
  }
  .info-order-btn:hover { background: var(--green-light); }
  /* 현장발주 인라인 폼 */
  .field-order-form { margin-top: 1.2rem; text-align: left; }
  .field-order-form .fo-label {
    font-size: 0.75rem; color: var(--dust); letter-spacing: 0.06em; margin-bottom: 0.4rem; display: block;
  }
  .fo-urgency-group { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .fo-urgency-btn {
    flex: 1; padding: 0.6rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600;
    font-family: inherit; cursor: pointer; border: 1.5px solid rgba(184,168,138,0.2);
    background: transparent; color: var(--dust); transition: all 0.15s;
  }
  .fo-urgency-btn.selected { color: var(--cream); }
  .fo-urgency-btn[data-urg="긴급"].selected { background: var(--red); border-color: var(--red); }
  .fo-urgency-btn[data-urg="보통"].selected { background: var(--amber); border-color: var(--amber); color: #0f0b07; }
  .fo-urgency-btn[data-urg="대비"].selected { background: var(--green); border-color: var(--green); }
  .fo-qty-row { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
  .fo-qty-input {
    width: 80px; padding: 0.6rem 0.8rem; background: var(--soil);
    border: 1px solid rgba(196,128,58,0.25); border-radius: 6px;
    color: var(--cream); font-size: 1.1rem; font-weight: 700;
    font-family: inherit; outline: none; text-align: center;
  }
  .fo-submit {
    width: 100%; padding: 0.8rem; background: var(--green); color: var(--cream);
    border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600;
    font-family: inherit; cursor: pointer; transition: background 0.2s;
  }
  .fo-submit:hover { background: var(--green-light); }
  .fo-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .fo-done {
    text-align: center; padding: 1rem; color: var(--green);
    font-size: 0.95rem; font-weight: 500;
  }
  /* 발주현황 모바일 뷰 */
  .order-card {
    background: var(--soil); border: 1px solid rgba(196,128,58,0.15);
    border-radius: 10px; padding: 1rem; margin-bottom: 0.8rem;
  }
  .order-card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.6rem; padding-bottom: 0.5rem;
    border-bottom: 1px solid rgba(196,128,58,0.1);
  }
  .order-supplier { font-size: 0.95rem; font-weight: 700; color: var(--cream); }
  .order-badge {
    font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 10px;
    border: 1px solid; font-weight: 600;
  }
  .order-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.35rem 0; font-size: 0.82rem;
  }
  .order-item-name { color: var(--cream); }
  .order-item-meta { color: var(--dust); font-size: 0.75rem; text-align: right; }
  .urg-긴급 { color: var(--red); border-color: var(--red); }
  .urg-보통 { color: var(--amber); border-color: var(--amber); }
  .urg-대비 { color: var(--green); border-color: var(--green); }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .login-box {
    width: 100%;
    max-width: 420px;
    background: var(--soil);
    border: 1px solid rgba(196,128,58,0.2);
    padding: 3rem 2.5rem;
    position: relative;
  }

  .login-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(to right, var(--amber), var(--green-light));
  }

  .login-brand {
    font-family: 'Noto Serif KR', serif;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: var(--amber);
    margin-bottom: 2rem;
    text-align: center;
  }

  .login-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--white);
    text-align: center;
    margin-bottom: 0.5rem;
  }

  .login-sub {
    font-size: 0.78rem;
    color: var(--dust);
    text-align: center;
    letter-spacing: 0.05em;
    margin-bottom: 2.5rem;
  }

  .form-group { margin-bottom: 1.2rem; }

  .form-label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--dust);
    margin-bottom: 0.5rem;
  }

  .form-input {
    width: 100%;
    background: rgba(15,11,7,0.8);
    border: 1px solid rgba(196,128,58,0.2);
    color: var(--cream);
    padding: 0.85rem 1rem;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.3s;
  }

  .form-input:focus { border-color: var(--amber); }

  .btn-login {
    width: 100%;
    background: var(--amber);
    color: var(--earth);
    border: none;
    padding: 1rem;
    font-family: 'Noto Serif KR', serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    margin-top: 0.5rem;
    transition: background 0.3s;
  }

  .btn-login:hover { background: var(--amber-light); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

  .login-error {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: rgba(184,58,42,0.15);
    border: 1px solid rgba(184,58,42,0.3);
    color: #e07070;
    font-size: 0.8rem;
    display: none;
  }

  .login-success {
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: rgba(61,92,53,0.2);
    border: 1px solid rgba(90,138,78,0.3);
    color: var(--green-light);
    font-size: 0.8rem;
    display: none;
  }

  .login-toggle {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.78rem;
    color: var(--dust);
  }

  .login-toggle a {
    color: var(--amber);
    text-decoration: none;
    cursor: pointer;
    letter-spacing: 0.02em;
  }

  .login-toggle a:hover {
    color: var(--amber-light);
    text-decoration: underline;
  }

  .nav-user {
    display: flex; align-items: center; gap: 1rem; position: relative;
  }
  .nav-user-email {
    font-size: 0.7rem; color: var(--dust); letter-spacing: 0.05em;
  }
  .btn-logout {
    background: none; border: 1px solid rgba(196,128,58,0.3);
    color: var(--dust); font-size: 0.7rem; padding: 0.3rem 0.8rem;
    cursor: pointer; font-family: inherit; letter-spacing: 0.05em;
    transition: all 0.3s; position: relative;
  }
  .btn-logout:hover { color: var(--cream); border-color: var(--amber); }

  @media print {
    #login-screen { display: none !important; }
  }
</style>
</head>
<body>

<!-- ── LOGIN ─────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-brand">품앗이소비자생활협동조합</div>
    <div class="login-title">가격표 인쇄</div>
    <div class="login-sub">운영자 전용 · 로그인이 필요합니다</div>

    <div class="form-group">
      <label class="form-label" for="email">이메일</label>
      <input class="form-input" type="email" id="email" placeholder="admin@poomasi.org" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">비밀번호</label>
      <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>

    <button class="btn-login" id="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="login-error"></div>
    <div class="login-toggle" id="toggle-to-signup">계정이 없으신가요? <a onclick="showSignup()">회원가입</a></div>

    <!-- ── 회원가입 폼 (기본 숨김) ── -->
    <div id="signup-form" style="display:none">
      <div class="login-title" style="font-size:1.6rem;margin-bottom:0.3rem;">회원가입</div>
      <div class="login-sub">가입코드를 아는 분만 가입할 수 있습니다</div>

      <div class="form-group">
        <label class="form-label" for="signup-email">이메일</label>
        <input class="form-input" type="email" id="signup-email" placeholder="email@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="signup-pw">비밀번호</label>
        <input class="form-input" type="password" id="signup-pw" placeholder="6자 이상" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label" for="signup-pw2">비밀번호 확인</label>
        <input class="form-input" type="password" id="signup-pw2" placeholder="비밀번호 재입력" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label" for="signup-code">가입코드</label>

async function doLogin() {

<script>
const HEADERS = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };
const SITE_BASE = 'https://poomasi.org';

// ── 현장발주 인라인 폼 ──
let _selectedUrgency = null;
let _orderMode = null; // 'min' or 'qty'
function selectUrgency(btn) {
  document.querySelectorAll('.fo-urgency-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  _selectedUrgency = btn.dataset.urg;
}
function selectOrderMode(mode) {
  _orderMode = mode;
  document.getElementById('fo-mode-min').classList.toggle('selected', mode === 'min');
  document.getElementById('fo-mode-qty').classList.toggle('selected', mode === 'qty');
  document.getElementById('fo-qty-row').style.display = mode === 'qty' ? 'flex' : 'none';
}
// 발주자 이름 localStorage 복원
(function() {
  const el = document.getElementById('fo-orderer');
  if (el) { el.value = localStorage.getItem('fo_orderer') || ''; }
})();

async function submitFieldOrder() {
  const orderer = (document.getElementById('fo-orderer').value || '').trim();
  if (!orderer) { alert('발주자 이름을 입력하세요'); return; }
  if (!_selectedUrgency) { alert('긴급도를 선택하세요'); return; }
  if (!_orderMode) { alert('최소발주 또는 갯수입력을 선택하세요'); return; }
  let qty;
  if (_orderMode === 'min') {
    qty = 0; // 0 = 최소발주 (발주담당자가 수량 결정)
  } else {
    qty = parseInt(document.getElementById('fo-qty').value) || 0;
    if (qty < 1) { alert('수량을 입력하세요'); return; }
  }
  const data = window._fieldOrderData || {};
  if (!data.item_name) { alert('상품 정보가 없습니다'); return; }

  localStorage.setItem('fo_orderer', orderer);
  const btn = document.getElementById('fo-submit-btn');
  btn.disabled = true; btn.textContent = '등록 중...';

  try {
    const r = await fetch(`${SB_URL}/rest/v1/staff_data`, {
      method: 'POST',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        item_name: data.item_name,
        farmer_name: data.farmer_name,
        qty: qty,
        urgency: _selectedUrgency,
        status: '대기',
        content: orderer
      })
    });
    if (!r.ok) throw new Error(r.status);
    document.getElementById('fo-done').style.display = 'block';
    const qtyText = _orderMode === 'min' ? '최소발주' : `${qty}개`;
    document.getElementById('fo-done').innerHTML = `${_selectedUrgency} · ${data.item_name} ${qtyText}<br><span style="font-size:0.8rem;color:var(--dust);">${orderer} 발주 등록 완료</span><br><a href="tags.html?orders=1" style="color:var(--amber);font-size:0.85rem;margin-top:0.5rem;display:inline-block;">발주현황 보기 →</a>`;
    btn.style.display = 'none';
  } catch (e) {
    alert('등록 실패: ' + e.message);
    btn.disabled = false; btn.textContent = '발주 등록';
  }
}

// ── 발주현황 모바일 뷰 ──
async function loadOrdersView() {
  const list = document.getElementById('orders-list');
  list.innerHTML = '<div style="text-align:center;color:var(--dust);padding:2rem;">로딩 중…</div>';

  try {
    const r = await fetch(`${SB_URL}/rest/v1/staff_data?status=eq.대기&select=id,item_name,farmer_name,qty,urgency,content,created_at&order=created_at.desc`, { headers: HEADERS });
    const data = await r.json();

    if (!data.length) {
      list.innerHTML = '<div style="text-align:center;color:var(--dust);padding:2rem;">대기 중인 발주가 없습니다</div>';
      return;
    }

    document.getElementById('orders-updated').textContent = '마지막 갱신: ' + new Date().toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'});

    // 거래처별 그룹
    const grouped = {};
    data.forEach(r => {
      const key = r.farmer_name || '(미지정)';
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(r);
    });

    const urgOrder = {'긴급':0,'보통':1,'대비':2};
    list.innerHTML = Object.entries(grouped)
      .sort((a,b) => {
        const aUrg = Math.min(...a[1].map(i => urgOrder[i.urgency] ?? 9));
        const bUrg = Math.min(...b[1].map(i => urgOrder[i.urgency] ?? 9));
        return aUrg - bUrg;
      })
      .map(([supplier, items]) => {
        const urgentCount = items.filter(i => i.urgency === '긴급').length;
        const badge = urgentCount > 0 ? `<span class="order-badge urg-긴급">긴급 ${urgentCount}</span>` : '';
        const rows = items.map(i => {
          const dt = i.created_at ? new Date(i.created_at).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
          const who = i.content ? `<span style="color:var(--amber);">${i.content}</span> · ` : '';
          return `<div class="order-item">
            <span class="order-item-name">${i.item_name || '—'} <span class="urg-${i.urgency}" style="font-size:0.72rem;">${i.urgency}</span></span>
            <span class="order-item-meta">${who}${i.qty || ''}개<br>${dt}</span>
          </div>`;
        }).join('');
        return `<div class="order-card">
          <div class="order-card-header">
            <span class="order-supplier">${supplier}</span>
            <span>${badge} <span style="font-size:0.75rem;color:var(--dust);">${items.length}건 · ${items.reduce((s,i)=>s+(i.qty||0),0)}개</span></span>
          </div>
          ${rows}
        </div>`;
      }).join('');
  } catch(e) {
    list.innerHTML = '<div style="text-align:center;color:var(--red);padding:2rem;">조회 실패</div>';
  }
}

// ── 파라미터 없이 접속 시 store.html 가격표 탭으로 리다이렉트 ──
const params = new URLSearchParams(location.search);
if (!params.get('orders') && !params.get('barcode') && !params.get('info')) {
  location.href = 'store.html#tab=tags';
}

// ── Product info view (QR scan landing) ──
if (params.get('orders')) {
  // 발주현황 모바일 뷰
  document.querySelector('nav').style.display = 'none';
  document.querySelector('.ui-wrap').style.display = 'none';
  document.getElementById('orders-view').style.display = 'block';
  loadOrdersView();
} else if (params.get('barcode')) {
  // 바코드 기반 — Supabase에서 실시간 조회
  document.querySelector('nav').style.display = 'none';
  document.querySelector('.ui-wrap').style.display = 'none';
  const iv = document.getElementById('info-view');
  iv.style.display = 'block';
  document.getElementById('info-product').textContent = '로딩중...';

  const bc = params.get('barcode');
  fetch(`${SB_URL}/rest/v1/products?barcode=eq.${encodeURIComponent(bc)}&select=product_name,farmer_name,unit,price,barcode&limit=1`, { headers: HEADERS })
    .then(r => r.json())
    .then(async rows => {
      if (rows.length) {
        const p = rows[0];
        // farmer_name이 없으면 pos_transactions에서 fallback
        if (!p.farmer_name) {
          try {
            const pr = await fetch(`${SB_URL}/rest/v1/pos_transactions?item_name=like.*${encodeURIComponent(p.product_name)}&select=farmer_name&limit=1&order=sold_at.desc`, { headers: HEADERS });
            const posRows = await pr.json();
            if (posRows.length && posRows[0].farmer_name) p.farmer_name = posRows[0].farmer_name;
          } catch(e) {}
        }
        const dname = cleanProductName(p.product_name, p.farmer_name);
        document.getElementById('info-product').textContent = dname;
        document.getElementById('info-farmer').textContent = p.farmer_name ? '생산자: ' + p.farmer_name : '';
        document.getElementById('info-unit').textContent = p.unit || '';
        document.getElementById('info-price').textContent = p.price ? Number(p.price).toLocaleString('ko-KR') + '원' : '';
        // 현장발주용 데이터 저장
        window._fieldOrderData = { item_name: dname, farmer_name: p.farmer_name || '' };
      } else {
        document.getElementById('info-product').textContent = '상품을 찾을 수 없습니다 (바코드: ' + bc + ')';
      }
    })
    .catch(() => {
      document.getElementById('info-product').textContent = '조회 실패';
    });
} else if (params.get('info')) {
  // 레거시: URL 파라미터 직접 표시 (기존 QR 호환)
  document.querySelector('nav').style.display = 'none';
  document.querySelector('.ui-wrap').style.display = 'none';
  const iv = document.getElementById('info-view');
  iv.style.display = 'block';
  document.getElementById('info-product').textContent = params.get('name') || '';
  document.getElementById('info-farmer').textContent = params.get('farmer') ? '생산자: ' + params.get('farmer') : '';
  document.getElementById('info-unit').textContent = params.get('unit') || '';
  const price = params.get('price');
  document.getElementById('info-price').textContent = price ? Number(price).toLocaleString('ko-KR') + '원' : '';
  window._fieldOrderData = { item_name: params.get('name') || '', farmer_name: params.get('farmer') || '' };
}

let quickSelected = null;
const cart = [];  // 장바구니

function renderCart() {
  const list = document.getElementById('cart-list');
  const count = document.getElementById('cart-count');
  const btn = document.getElementById('btn-cart-print');
  count.textContent = cart.length;
  btn.disabled = cart.length === 0;

  if (cart.length === 0) {
    list.innerHTML = '<div class="cart-empty">상품을 검색하여 추가하세요</div>';
    return;
  }
  list.innerHTML = cart.map((p, i) => `
    <div class="cart-item">
      <span class="ci-name">${cleanProductName(p.product_name, p.farmer_name)}</span>
      <span class="ci-price">${fmtPrice(p.price)}</span>
      <button class="ci-remove" onclick="removeFromCart(${i})">✕</button>
    </div>
  `).join('');
}

function addToCart(mode) {
  let p;
  if (mode === 'quick') {
    p = getQuickProduct();
  } else {
    p = readNewForm();
  }
  if (!p) return;
  cart.push(JSON.parse(JSON.stringify(p)));
  renderCart();
}

function removeFromCart(idx) {
  cart.splice(idx, 1);
  renderCart();
}

function clearCart() {
  cart.length = 0;
  renderCart();
}

function printCart() {
  if (cart.length === 0) return;
  printTags(cart);
}

// ── Search products from Supabase ──
async function searchProducts(q) {
  const r = await fetch(
    `${SB_URL}/rest/v1/products?product_name=ilike.*${encodeURIComponent(q)}*&select=id,product_name,farmer_name,unit,price,barcode,category,sales_count&order=sales_count.desc.nullslast&limit=15`,
    { headers: HEADERS }
  );
  return await r.json();
}

// ── Format price ──
function fmtPrice(n) {
  return n != null ? n.toLocaleString('ko-KR') + '원' : '-';
}

// ── farmer 핵심 이름 추출: (주)기운찬→기운찬, 함지박(주)→함지박 ──
function farmerCore(name) {
  if (!name) return '';
  return name.replace(/\(주\)|\(유\)|\(사\)|\(영\)|\(합\)|주식회사|유한회사|사단법인|영농조합법인|농업회사법인|영농|조합법인|법인|협동조합|조합/g, '').trim();
}

// ── 상품명 정리: 별표, 생산자 중복, 용량/단위 제거 ──
function cleanProductName(name, farmer) {
  if (!name) return '';
  const fcore = farmerCore(farmer);

  // 1. 앞뒤 별표 제거 + [행사]) 접두어 제거
  name = name.replace(/^\*+|\*+$/g, '').trim();
  name = name.replace(/^\[행사\]\)?/, '').trim();

  // 2. farmer 핵심 이름으로 괄호/접두 제거
  if (fcore && fcore.length >= 2) {
    // (기운찬) 형태
    name = name.replace(new RegExp('\\(' + fcore.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\)', 'g'), '');
    // 기운찬) 형태 (맨 앞, 여는 괄호 없이)
    const fcoreEsc = fcore.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    if (name.match(new RegExp('^' + fcoreEsc + '\\)'))) {
      name = name.slice(fcore.length + 1);
    }
    // 상품명 중간/끝에 farmer 핵심 이름 직접 포함
    name = name.replace(new RegExp(fcoreEsc, 'g'), '');
  }

  // 3. 괄호 안 farmer 원본명 또는 핵심명 매칭 시 제거
  if (farmer || fcore) {
    name = name.replace(/\(([^)]+)\)/g, (m, inner) => {
      if (farmer && (farmer.includes(inner) || inner.includes(farmer))) return '';
      if (fcore && (fcore.includes(inner) || inner.includes(fcore))) return '';
      return m;
    });
  }

  // 4. farmer 전체 이름 제거 (아직 남아있으면)
  if (farmer && farmer.length >= 2) {
    name = name.replace(farmer, '');
  }

  // 5. 괄호 안 용량/단위 제거: (70mlx30포), (375ml/유기), (500g) 등
  name = name.replace(/\([\d.,]+\s*(ml|mL|g|kg|L|l|입|포|봉|팩|개|매|ea)[\w/×x*]*\)/gi, '');
  // 6. 끝에 붙은 용량: 상품명500g, 상품명 70mlx30포
  name = name.replace(/\s*[\d.,]+\s*(ml|mL|g|kg|L|l|입|포|봉|팩|개|매|ea)[\w/×x*]*\s*$/gi, '');
  // 7. 빈 괄호, 잔여 별표, 앞쪽 잔여 닫는 괄호 정리
  name = name.replace(/\(\s*\)/g, '').replace(/^\*+|\*+$/g, '').replace(/^[)\s]+/, '').trim();
  return name || '(상품명없음)';
}

// ── Build a single tag HTML ──
function tagHTML(p) {
  const displayName = cleanProductName(p.product_name, p.farmer_name);
  const qrParams = new URLSearchParams({ info: '1', name: displayName });
  if (p.farmer_name) qrParams.set('farmer', p.farmer_name);
  if (p.unit) qrParams.set('unit', p.unit);
  if (p.price != null) qrParams.set('price', p.price);
  if (p.barcode) qrParams.set('barcode', p.barcode);
  const qrUrl = `${SITE_BASE}/tags.html?${qrParams.toString()}`;
  return `<div class="tag">
    <div class="tag-header">
      <span class="tag-farmer">${p.farmer_name || ''}</span>
      <span class="tag-logo">품앗이마을</span>
    </div>
    <div class="tag-product">${displayName}</div>
    <div class="tag-bottom">
      <div class="tag-qr" data-qr="${qrUrl.replace(/"/g, '&quot;')}"></div>
      <div class="tag-price-area">
        <div class="tag-unit">${p.unit || ''}</div>
        <div class="tag-price">${fmtPrice(p.price)}</div>
      </div>
    </div>
    <div class="tag-bar"></div>
  </div>`;
}

function renderQRCodes(container) {
  container.querySelectorAll('.tag-qr[data-qr]').forEach(el => {
    if (el.querySelector('img')) return;
    const qr = qrcode(0, 'M');
    qr.addData(el.dataset.qr);
    qr.make();
    el.innerHTML = qr.createImgTag(2, 0);
  });
}

// 상품명 폰트 자동 축소 (print_tags_6m.html과 동일)
function autoFitProductNames(container) {
  container.querySelectorAll('.tag-product').forEach(el => {
    el.style.fontSize = '18pt';
    let size = 18;
    while (el.scrollWidth > el.clientWidth && size > 10) {
      size -= 0.5;
      el.style.fontSize = size + 'pt';
    }
  });
}

// ── MODE TABS ──
document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.mode).classList.add('active');
  });
});

// ── QUICK MODE ──
const quickSearch = document.getElementById('quick-search');
const quickResults = document.getElementById('quick-results');
const quickPreview = document.getElementById('quick-preview');
const quickPreviewGrid = document.getElementById('quick-preview-grid');
const btnQuickAdd = document.getElementById('btn-quick-add');

let _searchTimer = null;
quickSearch.addEventListener('input', () => {
  clearTimeout(_searchTimer);
  const q = quickSearch.value.trim();
  quickResults.innerHTML = '';
  quickSelected = null;
  btnQuickAdd.disabled = true;
  quickPreview.style.display = 'none';
  quickEdit.style.display = 'none';

  if (!q) return;

  _searchTimer = setTimeout(async () => {
    const matches = await searchProducts(q);
    quickResults.innerHTML = '';
    matches.forEach(p => {
      const div = document.createElement('div');
      div.className = 'search-item';
      div.innerHTML = `
        <span class="si-name">${p.product_name}</span>
        <span class="si-farmer">${p.category || ''}</span>
        <span class="si-price">${p.unit || ''}</span>`;
      div.addEventListener('click', () => selectQuick(p, div));
      quickResults.appendChild(div);
    });
  }, 300);
});

const qFarmer = document.getElementById('q-farmer');
const qPrice = document.getElementById('q-price');
const quickEdit = document.getElementById('quick-edit');

function selectQuick(p, el) {
  document.querySelectorAll('.search-item').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
  quickSelected = p;
  btnQuickAdd.disabled = false;

  // Show edit fields with existing data
  quickEdit.style.display = 'block';
  qFarmer.value = p.farmer_name || '';
  qPrice.value = (p.price != null && p.price > 0) ? p.price : '';

  updateQuickPreview();
}

function getQuickProduct() {
  if (!quickSelected) return null;
  return Object.assign({}, quickSelected, {
    farmer_name: qFarmer.value.trim(),
    price: qPrice.value ? Number(qPrice.value) : null
  });
}

function updateQuickPreview() {
  const p = getQuickProduct();
  if (!p) return;
  quickPreview.style.display = 'block';
  quickPreviewGrid.innerHTML = tagHTML(p);
  renderQRCodes(quickPreviewGrid);
  autoFitProductNames(quickPreviewGrid);
}

qFarmer.addEventListener('input', updateQuickPreview);
qPrice.addEventListener('input', updateQuickPreview);

btnQuickPrint.addEventListener('click', () => {
  const p = getQuickProduct();
  if (!p) return;
  printTags([p]);
});

// ── NEW INPUT MODE ──
const newPreview = document.getElementById('new-preview');
const newPreviewGrid = document.getElementById('new-preview-grid');

function readNewForm() {
  const barcode = document.getElementById('new-barcode').value.trim();
  const name = document.getElementById('new-name').value.trim();
  const farmer = document.getElementById('new-farmer').value.trim();
  const unit = document.getElementById('new-unit').value.trim();
  const price = document.getElementById('new-price').value.trim();
  if (!name) return null;
  return { product_name: name, farmer_name: farmer, unit: unit, price: price ? Number(price) : null, barcode: barcode };
}

['new-barcode', 'new-name', 'new-farmer', 'new-unit', 'new-price'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    const p = readNewForm();
    if (!p) { newPreview.style.display = 'none'; return; }
    newPreview.style.display = 'block';
    newPreviewGrid.innerHTML = tagHTML(p);
    renderQRCodes(newPreviewGrid);
    autoFitProductNames(newPreviewGrid);
  });
});

document.getElementById('btn-new-print').addEventListener('click', () => {
  const p = readNewForm();
  if (!p) { document.getElementById('new-name').focus(); return; }
  printTags([p]);
});

// ── PRINT ──
function printTags(products) {
  const sheet = document.getElementById('print-sheet');
  const perPage = 18;
  let html = '';

  for (let i = 0; i < products.length; i += perPage) {
    const page = products.slice(i, i + perPage);
    html += '<div class="print-page">';
    page.forEach(p => { html += tagHTML(p); });
    html += '</div>';
  }

  sheet.innerHTML = html;
  renderQRCodes(sheet);
  autoFitProductNames(sheet);
  setTimeout(() => window.print(), 300);
}
