<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>위치 인증</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: var(--tg-theme-bg-color, #fff);
  color: var(--tg-theme-text-color, #333);
}
.container { text-align: center; padding: 20px; }
.spinner { font-size: 48px; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.msg { margin-top: 16px; font-size: 16px; }
.err { color: #e74c3c; margin-top: 16px; font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <div class="spinner" id="icon">📍</div>
  <p class="msg" id="msg">위치 확인 중...</p>
  <p class="err" id="err"></p>
</div>
<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

function sendResult(lat, lng, acc) {
  const data = JSON.stringify({ lat: lat, lng: lng, acc: Math.round(acc || 0) });
  document.getElementById('icon').textContent = '✅';
  document.getElementById('icon').style.animation = 'none';
  document.getElementById('msg').textContent = '위치 확인 완료';
  tg.sendData(data);
}

function showError(title, detail) {
  document.getElementById('icon').textContent = '❌';
  document.getElementById('icon').style.animation = 'none';
  document.getElementById('msg').textContent = title;
  document.getElementById('err').textContent = detail || '';
}

// 1순위: 텔레그램 LocationManager API
if (tg.LocationManager) {
  tg.LocationManager.init(function() {
    if (!tg.LocationManager.isLocationAvailable) {
      showError('위치 서비스를 켜주세요', '설정 > 위치 > 사용');
      return;
    }
    if (!tg.LocationManager.isAccessGranted) {
      tg.LocationManager.openSettings();
      return;
    }
    tg.LocationManager.getLocation(function(loc) {
      if (loc) {
        sendResult(loc.latitude, loc.longitude, loc.horizontal_accuracy);
      } else {
        // LocationManager 실패 시 브라우저 geolocation 시도
        tryBrowserGeo();
      }
    });
  });
} else {
  // 2순위: 브라우저 Geolocation API
  tryBrowserGeo();
}

function tryBrowserGeo() {
  if (!navigator.geolocation) {
    showError('위치를 지원하지 않습니다');
    return;
  }
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      sendResult(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy);
    },
    function(err) {
      if (err.code === 1) showError('위치 권한이 필요합니다', '설정에서 위치 권한을 허용해주세요');
      else if (err.code === 2) showError('GPS 신호 없음', 'GPS를 켜고 다시 시도해주세요');
      else showError('위치 확인 시간 초과', '다시 시도해주세요');
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}
</script>
<script src="/poomai-widget.js"></script>
</body>
</html>
