<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>조합원말씀 수기 양식 — 인쇄용</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #fff;
    color: #1a1a1a;
  }

  @media screen {
    body { padding: 2rem; background: #e8e8e8; }
    .page { background: #fff; max-width: 210mm; margin: 0 auto; box-shadow: 0 2px 20px rgba(0,0,0,0.15); }
    .no-print { display: flex; justify-content: center; gap: 1rem; padding: 1.5rem; }
    .no-print button {
      padding: 0.7rem 2rem;
      font-size: 1rem;
      font-family: 'Noto Sans KR', sans-serif;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-print { background: #c4803a; color: #fff; }
    .btn-print:hover { background: #e8a55a; }
    .btn-back { background: #eee; color: #333; }
    .btn-back:hover { background: #ddd; }
  }

  @media print {
    body { padding: 0; background: #fff; }
    .no-print { display: none !important; }
    .page { box-shadow: none; padding: 0; max-height: 277mm; }
    @page { size: A4; margin: 10mm; }
  }

  .page {
    padding: 10mm 15mm;
    display: flex;
    flex-direction: column;
    gap: 6mm;
  }

  .card {
    border: 2px solid #333;
    padding: 20px 25px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 15px;
    padding-bottom: 12px;
    border-bottom: 1px solid #ccc;
  }

  .card-title-area {}

  .card-brand {
    font-family: 'Noto Serif KR', serif;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: #999;
    margin-bottom: 4px;
  }

  .card-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.5rem;
    font-weight: 900;
  }

  .card-qr img {
    width: 60px;
    height: 60px;
  }

  .card-qr-text {
    font-size: 0.55rem;
    color: #999;
    text-align: center;
    margin-top: 2px;
  }

  .category-row {
    display: flex;
    gap: 12px;
    margin-bottom: 15px;
    flex-wrap: wrap;
  }

  .cat-check {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.9rem;
  }

  .checkbox {
    width: 16px;
    height: 16px;
    border: 2px solid #333;
    display: inline-block;
    flex-shrink: 0;
  }

  .write-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    margin-bottom: 12px;
  }

  .write-label {
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: #333;
  }

  .write-lines {
    flex: 1;
    min-height: 80px;
    border: 1px solid #ccc;
    background: repeating-linear-gradient(
      transparent,
      transparent 27px,
      #e8e8e8 27px,
      #e8e8e8 28px
    );
    padding: 4px 10px;
  }

  .contact-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-top: 8px;
    border-top: 1px solid #eee;
  }

  .contact-label {
    font-size: 0.8rem;
    color: #666;
    white-space: nowrap;
  }

  .contact-line {
    flex: 1;
    border-bottom: 1px solid #ccc;
    min-height: 20px;
  }

  .contact-optional {
    font-size: 0.65rem;
    color: #aaa;
  }

  .card-footer {
    font-size: 0.65rem;
    color: #bbb;
    text-align: right;
    margin-top: 6px;
  }
</style>
</head>
<body>

<div class="no-print">
  <button class="btn-print" onclick="window.print()">인쇄하기</button>
  <button class="btn-back" onclick="history.back()">돌아가기</button>
</div>

<div class="page">
  <!-- 카드 1 -->
  <div class="card">
    <div class="card-header">
      <div class="card-title-area">
        <div class="card-brand">품 앗 이 생 협</div>
        <div class="card-title">조합원 말씀함</div>
      </div>
      <div class="card-qr">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=60x60&data=https://poomasi.org/feedback.html" alt="QR">
        <div class="card-qr-text">온라인 작성</div>
      </div>
    </div>

    <div class="category-row">
      <div class="cat-check"><span class="checkbox"></span> 필요한 물건</div>
      <div class="cat-check"><span class="checkbox"></span> 건의·아이디어</div>
      <div class="cat-check"><span class="checkbox"></span> 직원 서비스</div>
    </div>

    <div class="write-area">
      <div class="write-label">한마디 남겨주세요</div>
      <div class="write-lines"></div>
    </div>

    <div class="contact-row">
      <span class="contact-label">연락처</span>
      <div class="contact-line"></div>
      <span class="contact-optional">(선택)</span>
    </div>
    <div class="card-footer">카운터에 넣어주세요 — 소중히 읽겠습니다</div>
  </div>

  <!-- 카드 2 (동일) -->
  <div class="card">
    <div class="card-header">
      <div class="card-title-area">
        <div class="card-brand">품 앗 이 생 협</div>
        <div class="card-title">조합원 말씀함</div>
      </div>
      <div class="card-qr">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=60x60&data=https://poomasi.org/feedback.html" alt="QR">
        <div class="card-qr-text">온라인 작성</div>
      </div>
    </div>

    <div class="category-row">
      <div class="cat-check"><span class="checkbox"></span> 필요한 물건</div>
      <div class="cat-check"><span class="checkbox"></span> 건의·아이디어</div>
      <div class="cat-check"><span class="checkbox"></span> 직원 서비스</div>
    </div>

    <div class="write-area">
      <div class="write-label">한마디 남겨주세요</div>
      <div class="write-lines"></div>
    </div>

    <div class="contact-row">
      <span class="contact-label">연락처</span>
      <div class="contact-line"></div>
      <span class="contact-optional">(선택)</span>
    </div>
    <div class="card-footer">카운터에 넣어주세요 — 소중히 읽겠습니다</div>
  </div>
</div>

<script src="https://seed.poomasi.org/poomai-widget.js?v=20260410a"></script>
</body>
</html>
